<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Система опросов</title>
    <link rel="stylesheet" href="../css/user.css">
</head>

<body>
    <header>
        <nav>
            <div class="logo">Система опросов</div>
            <div class="user-info">
                <a href="admin.html" class="admin-link" id="adminBtn" style="display:none;">Админ-панель</a>
                <span id="userNameDisplay" onclick="openModal('profileModal')"
                    style="cursor:pointer; text-decoration: underline;">Привет, Гость!</span>
                <a href="#" class="logout-btn" id="authBtn" onclick="handleAuthClick()">Войти</a>
            </div>
        </nav>
    </header>

    <main>
        <section class="poll-list">
            <h1>Доступные опросы</h1>

            <div class="grid">
                <div id="loader" style="text-align: center; grid-column: 1/-1;">Загрузка опросов...</div>
            </div>
        </section>

    </main>

    <footer>
        <p>&copy; Все права защищены, 2026</p>
    </footer>


    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('loginModal')">&times;</span>
            <h2>Вход</h2>
            <form id="loginForm">
                <input type="text" id="loginUser" placeholder="Логин" required>
                <input type="password" id="loginPass" placeholder="Пароль" required>
                <button type="submit" class="btn">Войти</button>
            </form>
            <p>Нет аккаунта? <a href="#" onclick="openModal('regModal'); closeModal('loginModal')">Регистрация</a></p>
        </div>
    </div>


    <div id="regModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('regModal')">&times;</span>
            <h2>Регистрация</h2>
            <form id="regForm">
                <input type="text" id="regUser" placeholder="Придумайте логин" required>
                <input type="password" id="regPass" placeholder="Пароль" required>
                <button type="submit" class="btn" style="background-color: #2ecc71;">Создать аккаунт</button>
                <button type="button" class="btn btn-cancel"
                    onclick="closeModal('regModal'); openModal('loginModal')">Назад</button>
            </form>
        </div>
    </div>


    <div id="profileModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('profileModal')">&times;</span>
            <h2>Мой профиль</h2>
            <form id="profileForm">
                <label>Логин:</label>
                <input type="text" id="profileUser" required>

                <label>Новый пароль (оставьте пустым, если не хотите менять):</label>
                <input type="password" id="profilePass" placeholder="••••••••">

                <button type="submit" class="btn" style="background-color: #f39c12;">Сохранить изменения</button>
            </form>
        </div>
    </div>
    <script src="../js/regLog.js"></script>
    <script src="../js/changeDataAccount.js"></script>
    <script src="/js/loadPolls.js"></script>
    <script src="/js/sendVote.js"></script>
</body>

</html>
